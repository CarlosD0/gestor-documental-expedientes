{% extends 'base.html' %}

{% block title %}Eliminar Libro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead">¿Estás seguro de que deseas eliminar el libro?</p>
                <h3 class="fw-bold text-dark my-4">"{{ libro.titulo }}"</h3>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sí, eliminar libro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
