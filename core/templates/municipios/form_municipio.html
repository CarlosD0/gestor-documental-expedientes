{% extends 'base.html' %}

{% block title %}Nuevo Municipio{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">
                    <i class="bi bi-building-add"></i>
                    Registrar Municipio
                </h5>

            </div>

            <div class="card-body p-4">

                <form method="post">

                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label fw-bold">
                                Clave Estado
                            </label>

                            {{ form.clave_estado }}

                        </div>

                        <div class="col-md-8 mb-3">

                            <label class="form-label fw-bold">
                                Estado
                            </label>

                            {{ form.estado }}

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label fw-bold">
                                Clave Municipio
                            </label>

                            {{ form.clave }}

                        </div>

                        <div class="col-md-8 mb-3">

                            <label class="form-label fw-bold">
                                Municipio
                            </label>

                            {{ form.nombre }}

                        </div>

                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">

                        <a href="{% url 'lista_municipios' %}"
                           class="btn btn-outline-secondary">

                            Cancelar

                        </a>

                        <button type="submit"
                                class="btn btn-primary">

                            <i class="bi bi-save-fill"></i>
                            Guardar Municipio

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
