{% extends 'base.html' %}
{% block title %}Gestión de Categorías{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags-fill"></i> Categorías</h2>
    <a href="{% url 'registrar_categoria' %}" class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg"></i> Nueva Categoría</a>
</div>

<div class="card card-custom">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="bg-light"><tr><th>Nombre</th><th>Descripción</th></tr></thead>
            <tbody>
                {% for cat in categorias %}
                <tr>
                    <td class="fw-bold"><span class="badge bg-secondary">{{ cat.nombre }}</span></td>
                    <td>{{ cat.descripcion|default:"-" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center py-5"><p class="text-muted">No hay categorías registradas.</p></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
