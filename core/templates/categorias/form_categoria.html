{% extends 'base.html' %}
{% block title %}Registrar Categoría{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-custom shadow-sm">
            <div class="card-header bg-primary text-white"><h5 class="mb-0">Nueva Categoría</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label">Nombre</label>{{ form.nombre }}</div>
                    <div class="mb-3"><label class="form-label">Descripción</label>{{ form.descripcion }}</div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'lista_categorias' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
