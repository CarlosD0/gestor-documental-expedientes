{% extends 'base.html' %}

{% block title %}
Importar CURP
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card border-0 shadow-sm">

                <div class="card-header bg-success text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-upload"></i>

                        Importar CURP

                    </h4>

                </div>

                <div class="card-body">

                    <p class="text-muted">

                        El archivo debe contener:

                    </p>

                    <ul>

                        <li>NUMERO_TARJETA_BANCARIA</li>
                        <li>CURP</li>

                    </ul>

                    <form method="post"
      enctype="multipart/form-data"
      id="formImportarCurp">

    {% csrf_token %}

    <div class="mb-3">

        {{ form.archivo_excel }}

    </div>

    <div id="mensajeProcesandoCurp"
         class="alert alert-warning d-none">

        <div class="d-flex align-items-center gap-2">

            <div class="spinner-border spinner-border-sm"></div>

            <strong>
                Procesando CURP, espera un momento...
            </strong>

        </div>

    </div>

    <div class="d-flex justify-content-end">

        <button type="submit"
                id="btnImportarCurp"
                class="btn btn-success">

            <i class="bi bi-upload"></i>

            Importar CURP

        </button>

    </div>

</form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    const formImportarCurp = document.getElementById('formImportarCurp');
    const btnImportarCurp = document.getElementById('btnImportarCurp');
    const mensajeProcesandoCurp = document.getElementById('mensajeProcesandoCurp');

    formImportarCurp.addEventListener('submit', function () {

        btnImportarCurp.disabled = true;

        btnImportarCurp.innerHTML = `
            <span class="spinner-border spinner-border-sm"></span>
            Procesando...
        `;

        mensajeProcesandoCurp.classList.remove('d-none');

    });

</script>

{% endblock %}
