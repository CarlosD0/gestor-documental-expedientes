{% extends 'base.html' %}

{% block title %}Capturar Entrega{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-primary text-white py-3">

                <h4 class="mb-0">

                    <i class="bi bi-check-circle-fill"></i>

                    Captura de Entrega de Tarjeta

                </h4>

            </div>

            <div class="card-body p-4">

                <!-- DATOS SOLO LECTURA -->

                <div class="row mb-4">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Beneficiario
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ libro.nombre }} {{ libro.apellido_paterno }} {{ libro.apellido_materno }}"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            CURP
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ libro.curp }}"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Programa
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ libro.programa_beca.nombre|default:'Sin programa' }}"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Escuela
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ libro.nombre_escuela }}"
                               readonly>

                    </div>

                </div>

                <hr>

                <!-- FORMULARIO OPERATIVO -->

                <form method="post"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Cupo
                        </label>

                        {{ form.cupo }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Fecha de Entrega
                        </label>

                        {{ form.fecha_entrega }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Evidencia Fotográfica
                        </label>

                        {{ form.portada }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Observaciones
                        </label>

                        {{ form.descripcion }}

                    </div>

                    <div class="d-flex justify-content-end gap-2">

                        <a href="{% url 'lista_libros' %}"
                           class="btn btn-secondary">

                            Cancelar

                        </a>

                        <button type="submit"
                                class="btn btn-primary">

                            <i class="bi bi-save-fill"></i>

                            Guardar Entrega

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
