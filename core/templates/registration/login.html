{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card card-custom shadow-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-person-circle"></i> Acceso Al Gestor Documental</h4>
            </div>
            <div class="card-body p-4">
                
                {% if form.errors %}
                    <div class="alert alert-danger text-center mb-3">
                        <small>Usuario o contraseña incorrectos.</small>
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg" autofocus required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Ingresar al Sistema</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light">
                <small class="text-muted">Sistema de Gestión v1.0</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
