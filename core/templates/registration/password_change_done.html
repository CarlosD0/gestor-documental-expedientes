{% extends 'base.html' %}

{% block title %}Contraseña Cambiada{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="alert alert-success shadow-sm p-5">
            <i class="bi bi-check-circle-fill display-1 text-success mb-3"></i>
            <h2 class="fw-bold">¡Contraseña Actualizada!</h2>
            <p class="lead mt-3">Tu contraseña ha sido cambiada exitosamente. Puedes usarla en tu próximo inicio de sesión.</p>
            <div class="mt-4">
                <a href="{% url 'home' %}" class="btn btn-primary btn-lg rounded-pill px-5">Volver al Inicio</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
