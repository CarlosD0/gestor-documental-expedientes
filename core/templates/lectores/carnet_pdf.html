<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carnet {{ lector.username }}</title>
    <style>
        /* 1. Definimos la hoja exacta y quitamos márgenes automáticos */
        @page {
            size: 85mm 54mm;
            margin: 0;
            padding: 0;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: Helvetica, sans-serif;
            background-color: #fff;
            width: 85mm;
            height: 54mm;
        }

        /* 2. CABECERA: Pegada arriba (Top: 0) */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12mm; /* Aumentamos un poco la altura del header */
            background-color: #0d6efd;
            color: white;
        }
        
        .header-text {
            padding-top: 4mm; /* Centrado visual */
            padding-left: 4mm;
            font-size: 10pt;
            text-transform: uppercase;
            font-weight: bold;
            margin: 0;
        }

        /* 3. CUERPO: Bajamos la posición para que no lo tape el título */
        .content {
            position: absolute;
            top: 16mm; /* ANTES 12mm -> AHORA 16mm (Más espacio abajo del título) */
            left: 0;
            width: 100%;
            height: 35mm;
        }

        /* Tabla interna para alinear datos y foto */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            vertical-align: top;
            padding: 0;
        }

        .col-info {
            width: 60%;
            padding-left: 4mm;
        }

        .col-photo {
            width: 40%;
            text-align: center;
            padding-right: 2mm;
        }

        /* Textos */
        .label {
            font-size: 5pt;
            color: #666;
            text-transform: uppercase;
            margin-top: 4px; /* Un poco más de espacio entre items */
        }

        .value {
            font-size: 9pt; /* Texto un pelín más grande para leer mejor */
            font-weight: bold;
            color: #000;
            margin-bottom: 1px;
        }

        /* Foto */
        .photo-box {
            width: 22mm;
            height: 26mm;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            color: #999;
            font-size: 6pt;
            line-height: 26mm; /* Centrar texto verticalmente */
            text-align: center;
            margin: 0 auto;
        }

        /* 4. PIE DE PÁGINA: Pegado abajo (Bottom: 0) */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5mm;
            background-color: #212529;
            color: white;
            text-align: center;
        }

        .footer-text {
            font-size: 5pt;
            margin: 0;
            padding-top: 1.5mm;
        }
    </style>
</head>
<body>
    <div class="header">
        <p class="header-text">{{ institucion }}</p>
    </div>

    <div class="content">
        <table>
            <tr>
                <td class="col-info">
                    <div class="label">Lector</div>
                    <div class="value">{{ lector.first_name }} {{ lector.last_name }}</div>

                    <div class="label">Código / DNI</div>
                    <div class="value">{{ lector.username }}</div>

                    <div class="label">Fecha Emisión</div>
                    <div class="value">{{ fecha_emision|date:"d/m/Y" }}</div>

                    <div class="label">Tipo de Usuario</div>
                    <div class="value">
                        {% if lector.is_staff %}PERSONAL{% else %}ESTUDIANTE{% endif %}
                    </div>
                </td>
                <td class="col-photo">
                    <div class="photo-box">FOTO</div>
                </td>
            </tr>
        </table>
    </div>

    <div class="footer">
        <p class="footer-text">Válido para préstamos en biblioteca - Intransferible</p>
    </div>
</body>
</html>
