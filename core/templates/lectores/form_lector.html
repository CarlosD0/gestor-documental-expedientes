{% extends 'base.html' %}

{% block title %}Registrar Lector{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-custom shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-badge"></i> Nuevo Lector</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Usuario (DNI o Matrícula)</label>
                        {{ form.username }}
                        <div class="form-text">Este será el ID único del lector en el sistema.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombres</label>
                            {{ form.first_name }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellidos</label>
                            {{ form.last_name }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña de Acceso</label>
                        {{ form.password }}
                    </div>

                    <hr>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'lista_lectores' %}" class="btn btn-secondary me-md-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Lector</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
