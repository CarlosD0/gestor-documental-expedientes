{% extends 'base.html' %}

{% block title %}Nueva Localidad{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-success text-white">

                <h5 class="mb-0">
                    <i class="bi bi-pin-map-fill"></i>
                    Registrar Localidad
                </h5>

            </div>

            <div class="card-body p-4">

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Municipio
                        </label>

                        {{ form.municipio }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Clave Localidad
                        </label>

                        {{ form.clave }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Nombre Localidad
                        </label>

                        {{ form.nombre }}

                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">

                        <a href="{% url 'lista_localidades' %}"
                           class="btn btn-outline-secondary">

                            Cancelar

                        </a>

                        <button type="submit"
                                class="btn btn-success">

                            <i class="bi bi-save-fill"></i>
                            Guardar Localidad

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
