{% extends 'base.html' %}
{% block title %}Gestión de Autores{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pen-fill"></i> Autores</h2>
    <a href="{% url 'registrar_autor' %}" class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg"></i> Nuevo Autor</a>
</div>

<div class="card card-custom">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="bg-light"><tr><th>Nombre</th><th>Nacionalidad</th></tr></thead>
            <tbody>
                {% for autor in autores %}
                <tr>
                    <td class="fw-bold">{{ autor.nombre }}</td>
                    <td>{{ autor.nacionalidad|default:"-" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center py-5"><p class="text-muted">No hay autores registrados.</p></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
