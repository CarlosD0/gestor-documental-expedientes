{% extends 'base.html' %}

{% block title %}Carátulas{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">
                <i class="bi bi-file-earmark-pdf-fill text-danger"></i>
                Generador de Carátulas
            </h2>

            <p class="text-muted mb-0">
                Genera carátulas oficiales por municipio, localidad y CCT
            </p>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <form method="get"
                  action="{% url 'generar_caratula_pdf' %}"
                  target="_blank">

                <div class="row">
                    

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">
                            Municipio
                        </label>

                        <select name="municipio"
                                id="municipioSelect"
                                class="form-select">

                            <option value="">
                                SELECCIONA MUNICIPIO
                            </option>

                            {% for municipio in municipios %}
                            <option value="{{ municipio.id }}">
                                {{ municipio.clave }} - {{ municipio.nombre }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">
                            Localidad
                        </label>

                        <select name="localidad"
                                id="localidadSelect"
                                class="form-select">

                            <option value="">
                                PRIMERO SELECCIONA UN MUNICIPIO
                            </option>

                        </select>
                    </div>

                    <div class="col-md-3 mb-3">

    <label class="form-label fw-bold">
        Escuela / CCT
    </label>

    <select name="cct"
            id="escuelaSelect"
            class="form-select">

        <option value="">
            PRIMERO SELECCIONA LOCALIDAD
        </option>

    </select>

</div>

<div class="col-md-3 mb-3">

    <label class="form-label fw-bold">
        Periodo
    </label>

    <select name="periodo"
            class="form-select">

        <option value="">
            TODOS LOS PERIODOS
        </option>

        {% for periodo in periodos %}

        <option value="{{ periodo }}">
            {{ periodo }}
        </option>

        {% endfor %}

    </select>

</div>
            <div class="col-md-12 mb-4">

    <label class="form-label fw-bold">
         Ingresa el Título de Carátula
    </label>

    <input type="text"
           name="titulo_caratula"
           class="form-control"
           value="INTEGRACIÓN DE KIT DOCUMENTAL ENTREGA DE TARJETAS 3 NIVELES">

</div>

                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit"
                            class="btn btn-danger btn-lg">

                        <i class="bi bi-file-earmark-pdf-fill"></i>
                        Generar Carátula PDF

                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const municipioSelect = document.getElementById('municipioSelect');
    const localidadSelect = document.getElementById('localidadSelect');
    const escuelaSelect = document.getElementById('escuelaSelect');

    municipioSelect.addEventListener('change', function () {

        const municipioId = this.value;

        localidadSelect.innerHTML = '';

        if (!municipioId) {
            localidadSelect.innerHTML = '<option value="">PRIMERO SELECCIONA UN MUNICIPIO</option>';
            return;
        }

        localidadSelect.innerHTML = '<option value="">Cargando localidades...</option>';

        fetch(`/localidades/por-municipio/${municipioId}/`)
            .then(response => response.json())
            .then(data => {

                localidadSelect.innerHTML = '<option value="">TODAS</option>';

                escuelaSelect.innerHTML =
                    '<option value="">PRIMERO SELECCIONA LOCALIDAD</option>';

                data.forEach(function (localidad) {
                    const option = document.createElement('option');
                    option.value = localidad.id;
                    option.textContent = localidad.nombre;
                    localidadSelect.appendChild(option);
                    
                });

            })
            .catch(error => {
                localidadSelect.innerHTML = '<option value="">Error al cargar localidades</option>';
            });

    });

    localidadSelect.addEventListener('change', function () {

    const localidadId = this.value;

    escuelaSelect.innerHTML = '';

    if (!localidadId) {

        escuelaSelect.innerHTML =
        '<option value="">PRIMERO SELECCIONA LOCALIDAD</option>';

        return;
    }

    escuelaSelect.innerHTML =
    '<option value="">Cargando escuelas...</option>';

    fetch(`/escuelas/por-localidad/${localidadId}/`)

        .then(response => response.json())

        .then(data => {

            escuelaSelect.innerHTML =
            '<option value="">TODAS</option>';

            data.forEach(function (escuela) {

                const option =
                document.createElement('option');

                option.value = escuela.cct;

                option.textContent = escuela.nombre;

                escuelaSelect.appendChild(option);

            });

        })

        .catch(error => {

            escuelaSelect.innerHTML =
            '<option value="">Error al cargar escuelas</option>';

        });

});


});
</script>

{% endblock %}
